<!DOCTYPE html>

<html lang="zh-TW">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>體重日記</title>

    <link rel="manifest" href="manifest.json">

    <meta name="apple-mobile-web-app-capable" content="yes">

    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <meta name="apple-mobile-web-app-title" content="體重日記">

    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3004/3004613.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {

            font-family: 'Noto Sans TC', sans-serif;

            padding: 20px;

            background-color: #f5ebe6;

            color: #5c4d43;

            padding-bottom: 80px;

        }

        .container {

            max-width: 500px;
            margin: 0 auto;
            background: #ffffff;
            padding: 25px;

            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(140, 116, 98, 0.08);

        }

        h1 {
            text-align: center;
            color: #222222;
            font-weight: 700;
            margin-bottom: 5px;
            font-size: 26px;
        }

        h3 {
            color: #8c7462;
            font-weight: 700;
            border-bottom: 2px solid #f2e6df;
            padding-bottom: 8px;
            margin-top: 30px;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: #8c7462;
        }

        input,
        select {

            width: 100%;
            padding: 12px;
            border: 1px solid #e1d4cc;
            background-color: #faf6f3;

            border-radius: 10px;
            box-sizing: border-box;
            font-family: 'Noto Sans TC', sans-serif;

            color: #5c4d43;
            font-size: 15px;
            transition: all 0.3s ease;
            margin-bottom: 12px;

        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #b88e6f;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(184, 142, 111, 0.15);
        }



        .target-box {
            background: #fdfaf7;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px dashed #d9c8be;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .target-box label {
            margin-bottom: 0;
        }

        .target-box input {
            width: 90px;
            text-align: center;
            padding: 8px;
            margin-bottom: 0;
        }



        button.primary-btn {

            width: 100%;
            padding: 14px;
            background-color: #b88e6f;
            color: white;
            border: none;

            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 5px;

            box-shadow: 0 5px 15px rgba(184, 142, 111, 0.3);
            transition: all 0.2s ease;

        }

        button.primary-btn:active {
            transform: scale(0.98);
            background-color: #a37b5d;
        }



        .history-item {
            background: #faf6f3;
            padding: 14px;
            border-radius: 12px;
            margin-top: 10px;
            border-left: 5px solid #d9b496;
            font-size: 14px;
        }



        .tdee-box {
            background: #fdfaf7;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #f2e6df;
            margin-bottom: 15px;
        }

        .gender-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 0 auto 15px auto;
            max-width: 240px;
        }

        .gender-grid label {

            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            color: #5c4d43;
            font-weight: 700;
            background: #faf6f3;

            padding: 8px 12px;
            border: 1px solid #e1d4cc;
            border-radius: 8px;
            margin-bottom: 0;
            font-size: 14px;
            transition: all 0.2s;

        }

        .gender-grid input[type="radio"] {
            width: auto;
            margin: 0;
            cursor: pointer;
        }

        .gender-grid input[type="radio"]:checked+span {
            color: #b88e6f;
        }

        .gender-grid label:has(input[type="radio"]:checked) {
            border-color: #b88e6f;
            background: #ffffff;
            box-shadow: 0 2px 6px rgba(184, 142, 111, 0.08);
        }



        .tdee-result-box {
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            border-left: 4px solid #b88e6f;
            display: none;
        }

        .tdee-result-box p {
            margin: 5px 0;
            font-size: 14px;
        }

        .tdee-result-box strong {
            color: #b88e6f;
            font-size: 16px;
        }



        /* 實時熱量預覽區 */

        .live-calorie-preview {
            background: #fffcf7;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #e1d4cc;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .keyword-badge {
            display: inline-block;
            background: #b88e6f;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 12px;
            margin: 2px;
        }



        /* 手動補救區樣式 */

        .manual-fix-box {
            background: #fdf6f0;
            border: 1px dashed #d9b496;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }



        /* 懸浮按鈕與彈窗 */

        .fab {

            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #d9b496;
            color: white;

            border: none;
            border-radius: 50px;
            padding: 15px 25px;
            font-size: 16px;
            font-weight: 700;

            box-shadow: 0 8px 25px rgba(217, 180, 150, 0.6);
            cursor: pointer;
            z-index: 1000;

            display: flex;
            align-items: center;
            gap: 8px;
            animation: float 3s ease-in-out infinite;

        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-8px);
            }

            100% {
                transform: translateY(0px);
            }
        }



        .modal-overlay {

            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            background: rgba(0, 0, 0, 0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1001;

            backdrop-filter: blur(3px);

        }

        .modal-content {

            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 85%;
            max-width: 350px;

            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            position: relative;

        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: #a69285;
        }

        .progress-bar-bg {
            background: #f2e6df;
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, #d9b496, #b88e6f);
            height: 100%;
            width: 0%;
            transition: width 1s ease-out;
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>⚖️ 體重日記</h1>

        <p style="text-align: center; color: #a69285; font-size: 13px; letter-spacing: 1px; margin-top: 0;">BEAUTIFUL
            LIFE & HEALTH</p>



        <div class="target-box">

            <label for="targetWeight">🎯 目標體重：</label>

            <div>

                <input type="number" id="targetWeight" placeholder="例如: 75">

                <span style="font-weight: 500; margin-left: 5px;">kg</span>

            </div>

        </div>



        <label for="todayWeight">☕ 今日體重紀錄：</label>

        <div style="position: relative; display: flex; align-items: center;">

            <input type="number" step="0.1" id="todayWeight" placeholder="0.0">

            <span style="position: absolute; right: 15px; top: 12px; font-weight: 500;">kg</span>

        </div>



        <label for="todayFood">🥪 今日飲食日記 (自動識別台灣常見美食)：</label>

        <input type="text" id="todayFood" placeholder="試試輸入：中午吃雞排，晚上吃滷肉飯配茶葉蛋">



        <!-- 實時熱量偵測預覽區 -->

        <div class="live-calorie-preview">

            <p style="margin: 0 0 5px 0; font-weight: 700; color: #8c7462;">🔍 智慧熱量偵測中：</p>

            <div id="detectedBadges" style="margin-bottom: 5px;"></div>



            <p style="margin: 5px 0 0 0;">預估今日攝取總熱量：<strong id="previewCalorieText"
                    style="color: #b88e6f; font-size: 18px;">0</strong> 大卡</p>

            <p id="tdeeCompareText" style="font-size: 12px; color: #a69285; margin: 3px 0 0 0;"></p>



            <!-- 💡 核心優化：現場手動追加補救功能 -->

            <div id="manualFixBlock" class="manual-fix-box">

                <span style="font-size:12px; color:#a37b5d; font-weight:700;">💡 偵測到未匹配的食物？在此手動補上熱量：</span>

                <div style="display:flex; gap: 8px; margin-top:5px;">

                    <input type="number" id="manualCalorieInput" placeholder="手動追加熱量(卡)"
                        style="margin-bottom:0; padding:8px; font-size:13px;">

                </div>

            </div>

        </div>



        <button id="saveBtn" class="primary-btn">💾 存下今日體重與熱量</button>



        <h3>🔥 TDEE 熱量計算機</h3>

        <div class="tdee-box">

            <div class="gender-grid">

                <label><input type="radio" name="gender" value="M" checked> <span>👨 男性</span></label>

                <label><input type="radio" name="gender" value="F"> <span>👩 女性</span></label>

            </div>

            <div style="display: flex; gap: 10px;">

                <input type="number" id="tdeeAge" placeholder="年齡 (歲)">

                <input type="number" id="tdeeHeight" placeholder="身高 (cm)">

            </div>

            <input type="number" id="tdeeWeightInput" placeholder="目前體重 (kg) - 點擊帶入最新紀錄">

            <select id="tdeeActivity">

                <option value="1.2">🛋️ 久坐 (幾乎不運動)</option>

                <option value="1.375">🚶 輕度 (每週運動1-3天)</option>

                <option value="1.55">🏃 中度 (每週運動3-5天)</option>

                <option value="1.725">🏋️ 高度 (每週運動6-7天)</option>

                <option value="1.9">🔥 極度 (雙倍強訓勞力)</option>

            </select>

            <button id="calcTdeeBtn" class="primary-btn" style="background-color: #8c7462;">🧮 計算專屬熱量</button>



            <div id="tdeeResult" class="tdee-result-box">

                <p>🔹 基礎代謝 (BMR)：<strong id="bmrRes">0</strong> 大卡</p>

                <p>🔹 每日總消耗 (TDEE)：<strong id="tdeeRes">0</strong> 大卡</p>

                <hr style="border: 0; border-top: 1px dashed #d9c8be; margin: 10px 0;">

                <p>💡 <strong>減脂建議：</strong>每日攝取約 <strong style="color:#d9534f;" id="cutRes">0</strong> 大卡</p>

                <p>💪 <strong>增肌建議：</strong>每日攝取約 <strong style="color:#5cb85c;" id="bulkRes">0</strong> 大卡</p>

            </div>

        </div>



        <h3>📊 體重趨勢累計圖表</h3>

        <div style="background: #faf6f3; padding: 10px; border-radius: 12px;">

            <canvas id="weightChart" width="400" height="260"></canvas>

        </div>



        <h3>📜 歷史紀錄</h3>

        <div id="historyList"></div>

    </div>



    <!-- 懸浮按鈕 -->

    <button class="fab" id="fabBtn">🏆 看進度</button>



    <!-- 懸浮進度彈窗 -->

    <div class="modal-overlay" id="progressModal">

        <div class="modal-content">

            <span class="modal-close" id="closeModal">&times;</span>

            <h2 style="color: #222; margin-top: 0;">進度報告 🚀</h2>

            <h1 id="progressPercent" style="color: #b88e6f; font-size: 40px; margin: 10px 0;">0%</h1>



            <div class="progress-bar-bg">

                <div class="progress-bar-fill" id="progressBarFill"></div>

            </div>



            <p id="progressKg" style="font-size: 18px; font-weight: 700; color: #5c4d43;"></p>

            <p id="progressQuote"
                style="font-size: 14px; color: #8c7462; line-height: 1.5; margin-top: 15px; padding: 10px; background: #faf6f3; border-radius: 10px;">
            </p>

        </div>

    </div>



    <script>

        let myChart = null;

        let baseDetectedCalorie = 0;

        let manualAddedCalorie = 0;



        // 🎯 台灣常見爆量美食字典大升級！

        const calorieDictionary = [

            { keywords: ["雞排", "炸雞排"], calorie: 650, label: "炸雞排(一片) 650卡" },

            { keywords: ["滷肉飯", "魯肉飯"], calorie: 450, label: "滷肉飯(一碗) 450卡" },

            { keywords: ["牛肉麵"], calorie: 800, label: "牛肉麵(一碗) 800卡" },

            { keywords: ["白飯", "米飯", "飯"], calorie: 260, label: "白飯(一碗) 260卡" },

            { keywords: ["雞胸肉", "雞胸"], calorie: 165, label: "雞胸肉(一份) 165卡" },

            { keywords: ["水煮蛋", "茶葉蛋", "雞蛋", "蛋"], calorie: 74, label: "雞蛋(一顆) 74卡" },

            { keywords: ["地瓜"], calorie: 120, label: "地瓜(一條) 120卡" },

            { keywords: ["牛肉", "牛排"], calorie: 250, label: "牛排(100g) 250卡" },

            { keywords: ["青菜", "蔬菜", "花椰菜"], calorie: 45, label: "燙青菜(一盤) 45卡" },

            { keywords: ["豆漿"], calorie: 110, label: "無糖豆漿(一杯) 110卡" },

            { keywords: ["奶茶", "飲料", "手搖飲"], calorie: 300, label: "手搖飲料(一杯) 300卡" },

            { keywords: ["便當"], calorie: 750, label: "排骨/雞腿便當 750卡" },

            { keywords: ["火鍋", "麻辣鍋"], calorie: 900, label: "火鍋(一頓) 900卡" },

            { keywords: ["鹹酥雞", "鹽酥雞"], calorie: 550, label: "鹹酥雞(一份) 550卡" },

            { keywords: ["地瓜球"], calorie: 200, label: "地瓜球(一小袋) 200卡" },

            { keywords: ["水餃"], calorie: 40, label: "水餃(一顆) 40卡" },

            { keywords: ["鍋貼"], calorie: 65, label: "鍋貼(一顆) 65卡" },

            { keywords: ["小籠包"], calorie: 60, label: "小籠包(一顆) 60卡" }

        ];



        window.onload = function () {

            const savedTarget = localStorage.getItem('targetWeight');

            if (savedTarget) { document.getElementById('targetWeight').value = savedTarget; }



            const savedTdee = localStorage.getItem('myTdeeValue');

            if (savedTdee) { document.getElementById('tdeeRes').innerText = savedTdee; }



            updateDashboard();

        };



        // 🧠 實時監聽飲食日記輸入框

        document.getElementById('todayFood').addEventListener('input', function () {

            const inputText = this.value;

            const badgesDiv = document.getElementById('detectedBadges');

            const manualFixBlock = document.getElementById('manualFixBlock');

            badgesDiv.innerHTML = '';



            let totalCal = 0;

            let detectedItems = [];



            if (inputText.trim() !== "") {

                // 顯示手動修正欄位給老闆自由發揮

                manualFixBlock.style.display = 'block';



                // 比對字典

                calorieDictionary.forEach(item => {

                    let matchCount = 0;

                    item.keywords.forEach(keyword => {

                        if (keyword && inputText.includes(keyword)) {

                            // 計算出現次數

                            const regex = new RegExp(keyword, 'g');

                            const matches = inputText.match(regex);

                            if (matches) matchCount = matches.length;

                        }

                    });



                    if (matchCount > 0) {

                        totalCal += (item.calorie * matchCount);

                        detectedItems.push(`${item.label} x${matchCount}`);

                    }

                });

            } else {

                manualFixBlock.style.display = 'none';

                document.getElementById('manualCalorieInput').value = '';

                manualAddedCalorie = 0;

            }



            baseDetectedCalorie = totalCal;



            // 渲染標籤

            detectedItems.forEach(itemLabel => {

                const span = document.createElement('span');

                span.className = 'keyword-badge';

                span.innerText = itemLabel;

                badgesDiv.appendChild(span);

            });



            if (detectedItems.length === 0 && inputText.trim() !== "") {

                badgesDiv.innerHTML = `<span style="color:#a69285; font-size:12px;">(未偵測到內建食物，請在下方手動輸入熱量)</span>`;

            }



            calculateGrandTotal();

        });



        // 監聽手動追加的熱量數值

        document.getElementById('manualCalorieInput').addEventListener('input', function () {

            manualAddedCalorie = parseFloat(this.value) || 0;

            calculateGrandTotal();

        });



        // 計算並顯示最終加總

        function calculateGrandTotal() {

            const finalTotal = baseDetectedCalorie + manualAddedCalorie;

            document.getElementById('previewCalorieText').innerText = finalTotal;



            // 與 TDEE 對比

            const tdeeVal = parseInt(document.getElementById('tdeeRes').innerText) || 0;

            if (tdeeVal > 0) {

                const remain = tdeeVal - finalTotal;

                if (remain >= 0) {

                    document.getElementById('tdeeCompareText').innerHTML = `⚖️ 距離今日 TDEE 額度還剩 <strong style="color:#5cb85c;">${remain}</strong> 大卡`;

                } else {

                    document.getElementById('tdeeCompareText').innerHTML = `⚠️ 已超出今日 TDEE 額度 <strong style="color:#d9534f;">${Math.abs(remain)}</strong> 大卡！`;

                }

            }

        }



        // 儲存今日資料

        document.getElementById('saveBtn').addEventListener('click', function () {

            const targetWeight = document.getElementById('targetWeight').value;

            const todayWeight = document.getElementById('todayWeight').value;

            const todayFood = document.getElementById('todayFood').value;

            const finalTotal = baseDetectedCalorie + manualAddedCalorie;



            if (!todayWeight) { alert('老闆，記得填寫體重喔！'); return; }



            const todayDate = new Date().toLocaleDateString();



            const dailyData = {

                weight: parseFloat(todayWeight),

                food: todayFood,

                calories: finalTotal,

                date: todayDate

            };



            if (targetWeight) { localStorage.setItem('targetWeight', targetWeight); }



            let historyLog = JSON.parse(localStorage.getItem('weightHistoryLog')) || [];

            const existingIndex = historyLog.findIndex(item => item.date === todayDate);

            if (existingIndex !== -1) { historyLog[existingIndex] = dailyData; }

            else { historyLog.push(dailyData); }



            localStorage.setItem('weightHistoryLog', JSON.stringify(historyLog));

            alert('🎉 成功鎖進保險箱！今日飲食與總熱量皆已完美存檔！');



            // 重置所有欄位

            document.getElementById('todayWeight').value = '';

            document.getElementById('todayFood').value = '';

            document.getElementById('manualCalorieInput').value = '';

            document.getElementById('detectedBadges').innerHTML = '';

            document.getElementById('previewCalorieText').innerText = '0';

            document.getElementById('tdeeCompareText').innerText = '';

            document.getElementById('manualFixBlock').style.display = 'none';

            baseDetectedCalorie = 0;

            manualAddedCalorie = 0;



            updateDashboard();

        });



        // 點擊帶入體重

        document.getElementById('tdeeWeightInput').addEventListener('click', function () {

            let historyLog = JSON.parse(localStorage.getItem('weightHistoryLog')) || [];

            if (historyLog.length > 0 && !this.value) {

                historyLog.sort((a, b) => new Date(b.date) - new Date(a.date));

                this.value = historyLog[0].weight;

            }

        });



        // TDEE 計算

        document.getElementById('calcTdeeBtn').addEventListener('click', function () {

            const gender = document.querySelector('input[name="gender"]:checked').value;

            const age = parseFloat(document.getElementById('tdeeAge').value);

            const height = parseFloat(document.getElementById('tdeeHeight').value);

            const weight = parseFloat(document.getElementById('tdeeWeightInput').value);

            const activity = parseFloat(document.getElementById('tdeeActivity').value);



            if (!age || !height || !weight) { alert("老闆，資料填齊才能計算喔！"); return; }



            let bmr = (10 * weight) + (6.25 * height) - (5 * age);

            bmr = gender === 'M' ? bmr + 5 : bmr - 161;

            const tdee = Math.round(bmr * activity);



            document.getElementById('bmrRes').innerText = Math.round(bmr);

            document.getElementById('tdeeRes').innerText = tdee;

            document.getElementById('cutRes').innerText = Math.round(tdee - 400);

            document.getElementById('bulkRes').innerText = Math.round(tdee + 300);



            localStorage.setItem('myTdeeValue', tdee);

            document.getElementById('tdeeResult').style.display = 'block';



            document.getElementById('todayFood').dispatchEvent(new Event('input'));

        });



        // 懸浮進度報告

        const fabBtn = document.getElementById('fabBtn');

        const modal = document.getElementById('progressModal');

        const closeModal = document.getElementById('closeModal');



        fabBtn.addEventListener('click', () => {

            let historyLog = JSON.parse(localStorage.getItem('weightHistoryLog')) || [];

            const targetWeight = parseFloat(localStorage.getItem('targetWeight'));



            if (!targetWeight || historyLog.length === 0) {

                alert('老闆，要先設定「目標體重」並「存過至少一次紀錄」才能看進度喔！');

                return;

            }



            historyLog.sort((a, b) => new Date(a.date) - new Date(b.date));

            const startWeight = historyLog[0].weight;

            const currentWeight = historyLog[historyLog.length - 1].weight;



            const totalToLose = startWeight - targetWeight;

            const currentLost = startWeight - currentWeight;

            const remaining = currentWeight - targetWeight;



            let percent = 0;

            if (totalToLose > 0) { percent = Math.round((currentLost / totalToLose) * 100); }

            else if (totalToLose < 0) { percent = Math.round(((currentWeight - startWeight) / (targetWeight - startWeight)) * 100); }



            if (percent < 0) percent = 0;

            document.getElementById('progressPercent').innerText = `${percent}%`;



            let quote = "";

            if (remaining > 0) {

                document.getElementById('progressKg').innerText = `距離目標還差 ${remaining.toFixed(1)} 公斤！`;

                if (percent <= 10) quote = "💪 萬事起頭難，頭過身就過！老闆，你已經踏出最重要的一步了！";

                else if (percent <= 50) quote = "🔥 狀態越來越好囉！堅持下去，脂肪正在發抖了！";

                else if (percent <= 80) quote = "🚀 進度過半啦！勝利就在眼前，現在放棄就太可惜了，衝刺！";

                else quote = "🌟 剩下一點點了！最後一哩路，準備迎接最完美的自己！";

            } else {

                document.getElementById('progressKg').innerText = `超狂！已經達標了！`;

                document.getElementById('progressBarFill').style.background = "linear-gradient(90deg, #5cb85c, #4cae4c)";

                quote = "🎉 太神啦元泰老闆！目標達成！快去吃頓大餐犒賞自己！";

            }



            document.getElementById('progressQuote').innerText = quote;

            modal.style.display = 'flex';

            setTimeout(() => { document.getElementById('progressBarFill').style.width = `${percent > 100 ? 100 : percent}%`; }, 100);

        });



        closeModal.addEventListener('click', () => { modal.style.display = 'none'; document.getElementById('progressBarFill').style.width = '0%'; });



        function updateDashboard() {

            let historyLog = JSON.parse(localStorage.getItem('weightHistoryLog')) || [];

            historyLog.sort((a, b) => new Date(a.date) - new Date(b.date));



            const historyListDiv = document.getElementById('historyList');

            historyListDiv.innerHTML = '';



            [...historyLog].reverse().forEach(item => {

                const itemDiv = document.createElement('div');

                itemDiv.className = 'history-item';

                itemDiv.innerHTML = `

                    <span style="color:#a69285; font-weight:700;">📅 ${item.date}</span><br>

                    <span style="display:inline-block; margin-top:5px;">⚖️ 體重：<strong>${item.weight} kg</strong></span><br>

                    <span style="color:#7a6253;">🍎 飲食：${item.food || '未紀錄'}</span><br>

                    <span style="color:#b88e6f; font-weight:700;">🔥 今日熱量：${item.calories || 0} kcal</span>

                `;

                historyListDiv.appendChild(itemDiv);

            });



            const dates = historyLog.map(item => item.date);

            const weights = historyLog.map(item => item.weight);

            const targetWeight = parseFloat(localStorage.getItem('targetWeight')) || null;

            const targetLine = new Array(dates.length).fill(targetWeight);



            if (myChart) { myChart.destroy(); }

            const ctx = document.getElementById('weightChart').getContext('2d');

            myChart = new Chart(ctx, {

                type: 'line',

                data: {

                    labels: dates,

                    datasets: [

                        { label: '實際體重 (kg)', data: weights, borderColor: '#b88e6f', backgroundColor: 'rgba(184, 142, 111, 0.1)', borderWidth: 3, tension: 0.3, pointBackgroundColor: '#b88e6f', pointRadius: 4 },

                        { label: '我的目標', data: targetLine, borderColor: '#d9c8be', borderDash: [6, 6], borderWidth: 2, fill: false, pointRadius: 0 }

                    ]

                },

                options: { responsive: true, plugins: { legend: { labels: { font: { family: 'Noto Sans TC' }, color: '#8c7462' } } }, scales: { x: { grid: { display: false }, ticks: { color: '#a69285', font: { family: 'Noto Sans TC', size: 10 } } }, y: { grid: { color: '#f2e6df' }, ticks: { color: '#a69285', font: { family: 'Noto Sans TC' } }, beginAtZero: false } } }

            });

        }

    </script>

</body>
