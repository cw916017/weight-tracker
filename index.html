<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>體重日記</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="體重日記">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3004/3004613.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            padding: 20px;
            background-color: #f5ebe6;
            color: #5c4d43;
            padding-bottom: 80px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(140, 116, 98, 0.08);
        }

        h1 {
            text-align: center;
            color: #222222;
            font-weight: 700;
            margin-bottom: 5px;
            font-size: 26px;
        }

        h3 {
            color: #8c7462;
            font-weight: 700;
            border-bottom: 2px solid #f2e6df;
            padding-bottom: 8px;
            margin-top: 30px;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: #8c7462;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e1d4cc;
            background-color: #faf6f3;
            border-radius: 10px;
            box-sizing: border-box;
            font-family: 'Noto Sans TC', sans-serif;
            color: #5c4d43;
            font-size: 15px;
            transition: all 0.3s ease;
            margin-bottom: 12px;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #b88e6f;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(184, 142, 111, 0.15);
        }

        .target-box {
            background: #fdfaf7;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px dashed #d9c8be;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .target-box label {
            margin-bottom: 0;
        }

        .target-box input {
            width: 90px;
            text-align: center;
            padding: 8px;
            margin-bottom: 0;
        }

        button.primary-btn {
            width: 100%;
            padding: 14px;
            background-color: #b88e6f;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 5px;
            box-shadow: 0 5px 15px rgba(184, 142, 111, 0.3);
            transition: all 0.2s ease;
        }

        button.primary-btn:active {
            transform: scale(0.98);
            background-color: #a37b5d;
        }

        .history-item {
            background: #faf6f3;
            padding: 14px;
            border-radius: 12px;
            margin-top: 10px;
            border-left: 5px solid #d9b496;
            font-size: 14px;
        }

        /* TDEE 區塊全面精準升級 */
        .tdee-box {
            background: #fdfaf7;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #f2e6df;
        }

        /* 使用 Grid 將男女按鈕對半分，絕對不跑格 */
        .gender-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .gender-grid label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            color: #5c4d43;
            font-weight: 700;
            background: #faf6f3;
            padding: 12px;
            border: 1px solid #e1d4cc;
            border-radius: 10px;
            margin-bottom: 0;
            transition: all 0.2s;
        }

        /* 當選取時，外框變深、背景變亮 */
        .gender-grid input[type="radio"]:checked+span {
            color: #b88e6f;
        }

        .gender-grid label:has(input[type="radio"]:checked) {
            border-color: #b88e6f;
            background: #ffffff;
            box-shadow: 0 2px 8px rgba(184, 142, 111, 0.1);
        }

        .tdee-result-box {
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            border-left: 4px solid #b88e6f;
            display: none;
        }

        .tdee-result-box p {
            margin: 5px 0;
            font-size: 14px;
        }

        .tdee-result-box strong {
            color: #b88e6f;
            font-size: 16px;
        }

        /* 懸浮按鈕與彈窗 */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #d9b496;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 15px 25px;
            font-size: 16px;
            font-weight: 700;
            box-shadow: 0 8px 25px rgba(217, 180, 150, 0.6);
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: float 3s ease-in-out infinite;
        }

        .fab:active {
            transform: scale(0.95);
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-8px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1001;
            backdrop-filter: blur(3px);
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 85%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: #a69285;
        }

        .progress-bar-bg {
            background: #f2e6df;
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, #d9b496, #b88e6f);
            height: 100%;
            width: 0%;
            transition: width 1s ease-out;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>⚖️ 體重日記</h1>
        <p style="text-align: center; color: #a69285; font-size: 13px; letter-spacing: 1px; margin-top: 0;">BEAUTIFUL
            LIFE & HEALTH</p>

        <div class="target-box">
            <label for="targetWeight">🎯 目標體重：</label>
            <div>
                <input type="number" id="targetWeight" placeholder="例如: 75">
                <span style="font-weight: 500; margin-left: 5px;">kg</span>
            </div>
        </div>

        <label for="todayWeight">☕ 今日體重紀錄：</label>
        <div style="position: relative; display: flex; align-items: center;">
            <input type="number" step="0.1" id="todayWeight" placeholder="0.0">
            <span style="position: absolute; right: 15px; top: 12px; font-weight: 500;">kg</span>
        </div>

        <label for="todayFood">🥪 今日飲食日記：</label>
        <input type="text" id="todayFood" placeholder="今天吃了哪些美味食物？">

        <button id="saveBtn" class="primary-btn">💾 存下今日體重，明日再戰</button>

        <h3>🔥 TDEE 熱量計算機</h3>
        <div class="tdee-box">
            <!-- 改用完美的 Grid 佈局，精準對齊 -->
            <div class="gender-grid">
                <label><input type="radio" name="gender" value="M" checked> <span>👨 男性</span></label>
                <label><input type="radio" name="gender" value="F"> <span>👩 女性</span></label>
            </div>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="tdeeAge" placeholder="年齡 (歲)">
                <input type="number" id="tdeeHeight" placeholder="身高 (cm)">
            </div>
            <input type="number" id="tdeeWeightInput" placeholder="目前體重 (kg) - 點擊帶入最新紀錄">
            <select id="tdeeActivity">
                <option value="1.2">🛋️ 久坐 (幾乎不運動)</option>
                <option value="1.375">🚶 輕度 (每週運動1-3天)</option>
                <option value="1.55">🏃 中度 (每週運動3-5天)</option>
                <option value="1.725">🏋️ 高度 (每週運動6-7天)</option>
                <option value="1.9">🔥 極度 (雙倍強訓勞力)</option>
            </select>
            <button id="calcTdeeBtn" class="primary-btn" style="background-color: #8c7462;">🧮 計算專屬熱量</button>

            <div id="tdeeResult" class="tdee-result-box">
                <p>🔹 基礎代謝 (BMR)：<strong id="bmrRes">0</strong> 大卡</p>
                <p>🔹 每日總消耗 (TDEE)：<strong id="tdeeRes">0</strong> 大卡</p>
                <hr style="border: 0; border-top: 1px dashed #d9c8be; margin: 10px 0;">
                <p>💡 <strong>減脂建議：</strong>每日攝取約 <strong style="color:#d9534f;" id="cutRes">0</strong> 大卡</p>
                <p>💪 <strong>增肌建議：</strong>每日攝取約 <strong style="color:#5cb85c;" id="bulkRes">0</strong> 大卡</p>
            </div>
        </div>

        <h3>📊 體重趨勢累計圖表</h3>
        <div style="background: #faf6f3; padding: 10px; border-radius: 12px;">
            <canvas id="weightChart" width="400" height="260"></canvas>
        </div>

        <h3>📜 歷史紀錄</h3>
        <div id="historyList"></div>
    </div>

    <!-- 懸浮按鈕 -->
    <button class="fab" id="fabBtn">🏆 看進度</button>

    <!-- 懸浮進度彈窗 -->
    <div class="modal-overlay" id="progressModal">
        <div class="modal-content">
            <span class="modal-close" id="closeModal">&times;</span>
            <h2 style="color: #222; margin-top: 0;">進度報告 🚀</h2>
            <h1 id="progressPercent" style="color: #b88e6f; font-size: 40px; margin: 10px 0;">0%</h1>

            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBarFill"></div>
            </div>

            <p id="progressKg" style="font-size: 18px; font-weight: 700; color: #5c4d43;"></p>
            <p id="progressQuote"
                style="font-size: 14px; color: #8c7462; line-height: 1.5; margin-top: 15px; padding: 10px; background: #faf6f3; border-radius: 10px;">
            </p>
        </div>
    </div>

    <script>
        let myChart = null;
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js').catch(err => console.log('SW Error: ', err));
        }

        window.onload = function () {
            const savedTarget = localStorage.getItem('targetWeight');
            if (savedTarget) { document.getElementById('targetWeight').value = savedTarget; }
            updateDashboard();
        };

        document.getElementById('saveBtn').addEventListener('click', function () {
            const targetWeight = document.getElementById('targetWeight').value;
            const todayWeight = document.getElementById('todayWeight').value;
            const todayFood = document.getElementById('todayFood').value;

            if (!todayWeight) { alert('老闆，記得填寫體重喔！'); return; }

            const todayDate = new Date().toLocaleDateString();
            const dailyData = { weight: parseFloat(todayWeight), food: todayFood, date: todayDate };

            if (targetWeight) { localStorage.setItem('targetWeight', targetWeight); }

            let historyLog = JSON.parse(localStorage.getItem('weightHistoryLog')) || [];
            const existingIndex = historyLog.findIndex(item => item.date === todayDate);
            if (existingIndex !== -1) { historyLog[existingIndex] = dailyData; }
            else { historyLog.push(dailyData); }

            localStorage.setItem('weightHistoryLog', JSON.stringify(historyLog));
            alert('🎉 成功鎖進保險箱！存下今日體重，明日再戰！');
            document.getElementById('todayWeight').value = '';
            document.getElementById('todayFood').value = '';
            updateDashboard();
        });

        document.getElementById('tdeeWeightInput').addEventListener('click', function () {
            let historyLog = JSON.parse(localStorage.getItem('weightHistoryLog')) || [];
            if (historyLog.length > 0 && !this.value) {
                historyLog.sort((a, b) => new Date(b.date) - new Date(a.date));
                this.value = historyLog[0].weight;
            }
        });

        document.getElementById('calcTdeeBtn').addEventListener('click', function () {
            const gender = document.querySelector('input[name="gender"]:checked').value;
            const age = parseFloat(document.getElementById('tdeeAge').value);
            const height = parseFloat(document.getElementById('tdeeHeight').value);
            const weight = parseFloat(document.getElementById('tdeeWeightInput').value);
            const activity = parseFloat(document.getElementById('tdeeActivity').value);

            if (!age || !height || !weight) { alert("老闆，年齡、身高、體重要填齊才能算喔！"); return; }

            let bmr = (10 * weight) + (6.25 * height) - (5 * age);
            bmr = gender === 'M' ? bmr + 5 : bmr - 161;

            const tdee = bmr * activity;

            document.getElementById('bmrRes').innerText = Math.round(bmr);
            document.getElementById('tdeeRes').innerText = Math.round(tdee);
            document.getElementById('cutRes').innerText = Math.round(tdee - 400);
            document.getElementById('bulkRes').innerText = Math.round(tdee + 300);

            document.getElementById('tdeeResult').style.display = 'block';
        });

        const fabBtn = document.getElementById('fabBtn');
        const modal = document.getElementById('progressModal');
        const closeModal = document.getElementById('closeModal');

        fabBtn.addEventListener('click', () => {
            let historyLog = JSON.parse(localStorage.getItem('weightHistoryLog')) || [];
            const targetWeight = parseFloat(localStorage.getItem('targetWeight'));

            if (!targetWeight || historyLog.length === 0) {
                alert('老闆，要先設定「目標體重」並「存過至少一次紀錄」才能看進度喔！');
                return;
            }

            historyLog.sort((a, b) => new Date(a.date) - new Date(b.date));
            const startWeight = historyLog[0].weight;
            const currentWeight = historyLog[historyLog.length - 1].weight;

            const totalToLose = startWeight - targetWeight;
            const currentLost = startWeight - currentWeight;
            const remaining = currentWeight - targetWeight;

            let percent = 0;
            if (totalToLose > 0) { percent = Math.round((currentLost / totalToLose) * 100); }
            else if (totalToLose < 0) { percent = Math.round(((currentWeight - startWeight) / (targetWeight - startWeight)) * 100); }

            if (percent < 0) percent = 0;

            document.getElementById('progressPercent').innerText = `${percent}%`;

            let quote = "";
            if (remaining > 0) {
                document.getElementById('progressKg').innerText = `距離目標還差 ${remaining.toFixed(1)} 公斤！`;
                if (percent <= 10) quote = "💪 萬事起頭難，頭過身就過！老闆，你已經踏出最重要的一步了！";
                else if (percent <= 50) quote = "🔥 狀態越來越好囉！堅持下去，脂肪正在發抖了！";
                else if (percent <= 80) quote = "🚀 進度過半啦！勝利就在眼前，現在放棄就太可惜了，衝刺！";
                else quote = "🌟 剩下一點點了！最後一哩路，準備迎接最完美的自己！";
            } else {
                document.getElementById('progressKg').innerText = `超狂！已經達標了！`;
                document.getElementById('progressBarFill').style.background = "linear-gradient(90deg, #5cb85c, #4cae4c)";
                quote = "🎉 太神啦元泰老闆！目標達成！快去吃頓大餐犒賞自己，然後準備設定下一個巔峰目標吧！";
            }

            document.getElementById('progressQuote').innerText = quote;
            modal.style.display = 'flex';

            setTimeout(() => { document.getElementById('progressBarFill').style.width = `${percent > 100 ? 100 : percent}%`; }, 100);
        });

        closeModal.addEventListener('click', () => { modal.style.display = 'none'; document.getElementById('progressBarFill').style.width = '0%'; });
        window.addEventListener('click', (e) => { if (e.target === modal) { modal.style.display = 'none'; document.getElementById('progressBarFill').style.width = '0%'; } });

        function updateDashboard() {
            let historyLog = JSON.parse(localStorage.getItem('weightHistoryLog')) || [];
            historyLog.sort((a, b) => new Date(a.date) - new Date(b.date));

            const historyListDiv = document.getElementById('historyList');
            historyListDiv.innerHTML = '';

            [...historyLog].reverse().forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'history-item';
                itemDiv.innerHTML = `<span style="color:#a69285; font-weight:700;">📅 ${item.date}</span><br><span style="display:inline-block; margin-top:5px;">⚖️ 體重：<strong>${item.weight} kg</strong></span><br><span style="color:#7a6253;">🍎 飲食：${item.food || '純喝水，沒吃東西'}</span>`;
                historyListDiv.appendChild(itemDiv);
            });

            const dates = historyLog.map(item => item.date);
            const weights = historyLog.map(item => item.weight);
            const targetWeight = parseFloat(localStorage.getItem('targetWeight')) || null;
            const targetLine = new Array(dates.length).fill(targetWeight);

            if (myChart) { myChart.destroy(); }
            const ctx = document.getElementById('weightChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [
                        { label: '實際體重 (kg)', data: weights, borderColor: '#b88e6f', backgroundColor: 'rgba(184, 142, 111, 0.1)', borderWidth: 3, tension: 0.3, pointBackgroundColor: '#b88e6f', pointRadius: 4 },
                        { label: '我的目標', data: targetLine, borderColor: '#d9c8be', borderDash: [6, 6], borderWidth: 2, fill: false, pointRadius: 0 }
                    ]
                },
                options: { responsive: true, plugins: { legend: { labels: { font: { family: 'Noto Sans TC' }, color: '#8c7462' } } }, scales: { x: { grid: { display: false }, ticks: { color: '#a69285', font: { family: 'Noto Sans TC', size: 10 } } }, y: { grid: { color: '#f2e6df' }, ticks: { color: '#a69285', font: { family: 'Noto Sans TC' } }, beginAtZero: false } } }
            });
        }
    </script>
</body>

</html>
