<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的奶茶色體重日記</title>
    <!-- 引入 App 身份證 -->
    <link rel="manifest" href="manifest.json">
    <!-- 針對 iOS Safari 的專屬優化 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="體重日記">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3004/3004613.png">

    <!-- 引入優雅靈活的思源黑體字型 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- 引入強大的 Chart.js 圖表引擎 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* 全局字體與舒適燕麥奶茶背景 */
        body {
            font-family: 'Noto Sans TC', sans-serif;
            padding: 20px;
            background-color: #f5ebe6;
            /* 溫柔燕麥色 */
            color: #5c4d43;
            /* 深拿鐵咖啡字體色 */
        }

        /* App 主容器 - 白綢緞圓角質感 */
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 20px;
            /* 超好看圓角 */
            box-shadow: 0 10px 30px rgba(140, 116, 98, 0.08);
            /* 淡淡的拿鐵色陰影 */
        }

        /* 主標題 */
        h1 {
            text-align: center;
            color: #7a6253;
            font-weight: 700;
            margin-bottom: 5px;
            font-size: 24px;
        }

        h3 {
            color: #8c7462;
            font-weight: 500;
            border-bottom: 2px solid #f2e6df;
            padding-bottom: 8px;
            margin-top: 25px;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: #8c7462;
        }

        /* 精緻輸入框設計 */
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e1d4cc;
            background-color: #faf6f3;
            border-radius: 10px;
            box-sizing: border-box;
            font-family: 'Noto Sans TC', sans-serif;
            color: #5c4d43;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #b88e6f;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(184, 142, 111, 0.15);
        }

        /* 奶茶風目標區 */
        .target-box {
            background: #fdfaf7;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px dashed #d9c8be;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .target-box label {
            margin-bottom: 0;
        }

        .target-box input {
            width: 90px;
            text-align: center;
            padding: 8px;
        }

        /* 焦糖瑪奇朵儲存按鈕 */
        #saveBtn {
            width: 100%;
            padding: 14px;
            background-color: #b88e6f;
            /* 焦糖色 */
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            margin-bottom: 10px;
            box-shadow: 0 5px 15px rgba(184, 142, 111, 0.3);
            transition: all 0.2s ease;
        }

        #saveBtn:active {
            transform: scale(0.98);
            background-color: #a37b5d;
        }

        /* 復古小卡歷史紀錄 */
        .history-item {
            background: #faf6f3;
            padding: 14px;
            border-radius: 12px;
            margin-top: 10px;
            border-left: 5px solid #d9b496;
            /* 奶茶漸層條 */
            font-size: 14px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>⚖️ 體重與飲食日記</h1>
        <p style="text-align: center; color: #a69285; font-size: 13px; letter-spacing: 1px; margin-top: 0;">BEAUTIFUL
            LIFE & HEALTH</p>

        <!-- 1. 目標設定區 -->
        <div class="target-box">
            <label for="targetWeight">🎯 我的目標體重：</label>
            <div>
                <input type="number" id="targetWeight" placeholder="例如: 75">
                <span style="font-weight: 500; margin-left: 5px;">kg</span>
            </div>
        </div>

        <!-- 2. 每日體重輸入區 -->
        <div style="margin-bottom: 15px;">
            <label for="todayWeight">☕ 今日體重紀錄：</label>
            <div style="position: relative; display: flex; align-items: center;">
                <input type="number" step="0.1" id="todayWeight" placeholder="0.0">
                <span style="position: absolute; right: 15px; font-weight: 500;">kg</span>
            </div>
        </div>

        <!-- 3. 每日飲食輸入區 -->
        <div style="margin-bottom: 20px;">
            <label for="todayFood">🥪 今日飲食日記：</label>
            <input type="text" id="todayFood" placeholder="今天吃了哪些美味食物？">
        </div>

        <!-- 4. 儲存按鈕 -->
        <button id="saveBtn">💾 記錄今天，踏出下一步</button>

        <!-- 5. 圖表顯示區 -->
        <h3>📊 體重趨勢累計圖表</h3>
        <div style="margin-top: 15px; background: #faf6f3; padding: 10px; border-radius: 12px;">
            <canvas id="weightChart" width="400" height="260"></canvas>
        </div>

        <!-- 6. 歷史飲食清單區 -->
        <h3>📜 歷史飲食日記</h3>
        <div id="historyList"></div>

    </div>

    <!-- 核心邏輯指令碼 -->
    <script>
        let myChart = null;

        // 註冊離線守護者
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(() => console.log('Service Worker Active'))
                .catch(err => console.log('SW Error: ', err));
        }

        window.onload = function () {
            const savedTarget = localStorage.getItem('targetWeight');
            if (savedTarget) {
                document.getElementById('targetWeight').value = savedTarget;
            }
            updateDashboard();
        };

        document.getElementById('saveBtn').addEventListener('click', function () {
            const targetWeight = document.getElementById('targetWeight').value;
            const todayWeight = document.getElementById('todayWeight').value;
            const todayFood = document.getElementById('todayFood').value;

            if (!todayWeight) {
                alert('老闆，記得先填寫今天的體重再儲存喔！');
                return;
            }

            const todayDate = new Date().toLocaleDateString();
            const dailyData = {
                weight: parseFloat(todayWeight),
                food: todayFood,
                date: todayDate
            };

            if (targetWeight) {
                localStorage.setItem('targetWeight', targetWeight);
            }

            let historyLog = JSON.parse(localStorage.getItem('weightHistoryLog')) || [];
            const existingIndex = historyLog.findIndex(item => item.date === todayDate);

            if (existingIndex !== -1) {
                historyLog[existingIndex] = dailyData;
            } else {
                historyLog.push(dailyData);
            }

            localStorage.setItem('weightHistoryLog', JSON.stringify(historyLog));

            alert('🎉 成功鎖進保險箱！繼續保持，你是最棒的！');

            document.getElementById('todayWeight').value = '';
            document.getElementById('todayFood').value = '';

            updateDashboard();
        });

        function updateDashboard() {
            let historyLog = JSON.parse(localStorage.getItem('weightHistoryLog')) || [];
            historyLog.sort((a, b) => new Date(a.date) - new Date(b.date));

            const historyListDiv = document.getElementById('historyList');
            historyListDiv.innerHTML = '';

            const displayLog = [...historyLog].reverse();
            displayLog.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'history-item';
                itemDiv.innerHTML = `<span style="color:#a69285; font-weight:700;">📅 ${item.date}</span><br><span style="display:inline-block; margin-top:5px;">⚖️ 體重：<strong>${item.weight} kg</strong></span><br><span style="color:#7a6253;">🍎 飲食：${item.food || '純喝水，沒吃東西'}</span>`;
                historyListDiv.appendChild(itemDiv);
            });

            const dates = historyLog.map(item => item.date);
            const weights = historyLog.map(item => item.weight);
            const targetWeight = parseFloat(localStorage.getItem('targetWeight')) || null;
            const targetLine = new Array(dates.length).fill(targetWeight);

            if (myChart) {
                myChart.destroy();
            }

            // 圖表也改成奶茶配色
            const ctx = document.getElementById('weightChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [
                        {
                            label: '實際體重 (kg)',
                            data: weights,
                            borderColor: '#b88e6f', /* 焦糖瑪奇朵主線線條 */
                            backgroundColor: 'rgba(184, 142, 111, 0.1)',
                            borderWidth: 3,
                            tension: 0.3,
                            pointBackgroundColor: '#b88e6f',
                            pointRadius: 4
                        },
                        {
                            label: '我的目標',
                            data: targetLine,
                            borderColor: '#d9c8be', /* 淺奶茶色虛線 */
                            borderDash: [6, 6],
                            borderWidth: 2,
                            fill: false,
                            pointRadius: 0
                        }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            labels: {
                                font: { family: 'Noto Sans TC' },
                                color: '#8c7462'
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { color: '#a69285', font: { family: 'Noto Sans TC', size: 10 } }
                        },
                        y: {
                            grid: { color: '#f2e6df' },
                            ticks: { color: '#a69285', font: { family: 'Noto Sans TC' } },
                            beginAtZero: false
                        }
                    }
                }
            });
        }
    </script>
</body>

</html>
