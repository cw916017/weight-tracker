<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>體重日記</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            padding: 20px;
            background-color: #f5ebe6;
            color: #5c4d43;
            padding-bottom: 80px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(140, 116, 98, 0.08);
        }

        h1 {
            text-align: center;
            color: #222222;
            font-weight: 700;
            margin-bottom: 5px;
            font-size: 26px;
        }

        label {
            display: block;
            font-weight: 500;
            margin: 15px 0 8px 0;
            color: #8c7462;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e1d4cc;
            border-radius: 10px;
            box-sizing: border-box;
            background: #faf6f3;
        }

        .action-card {
            background: #fdfaf7;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #f2e6df;
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }

        .btn-weight {
            background-color: #8c7462;
            color: white;
        }

        .btn-food {
            background-color: #b88e6f;
            color: white;
        }

        button:active {
            transform: scale(0.98);
        }

        .live-preview {
            font-size: 13px;
            color: #a69285;
            margin-top: 8px;
            padding: 10px;
            background: #fff;
            border-radius: 8px;
            border: 1px dashed #d9c8be;
        }

        .history-item {
            background: #faf6f3;
            padding: 12px;
            border-radius: 10px;
            margin-top: 10px;
            border-left: 4px solid #d9b496;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>⚖️ 體重日記</h1>

        <!-- 體重區塊 -->
        <div class="action-card">
            <label>🎯 目標體重 (kg)：</label>
            <input type="number" id="targetWeight" placeholder="75">

            <label>☕ 今日體重 (kg)：</label>
            <input type="number" step="0.1" id="todayWeight" placeholder="0.0">
            <button class="btn-weight" onclick="saveWeight()">💾 鎖定今日體重</button>
        </div>

        <!-- 飲食區塊 -->
        <div class="action-card">
            <label>🥪 今日飲食日記：</label>
            <input type="text" id="todayFood" placeholder="例如：吃了雞排、滷肉飯">
            <div class="live-preview" id="caloriePreview">預估熱量：0 大卡</div>
            <button class="btn-food" onclick="saveFood()">🍎 紀錄今日飲食</button>
        </div>

        <h3>📜 歷史紀錄</h3>
        <div id="historyList"></div>
    </div>

    <script>
        const calorieDictionary = [
            { keywords: ["雞排"], calorie: 650 }, { keywords: ["滷肉飯"], calorie: 450 },
            { keywords: ["牛肉麵"], calorie: 800 }, { keywords: ["茶葉蛋"], calorie: 74 },
            { keywords: ["便當"], calorie: 750 }, { keywords: ["鹹酥雞"], calorie: 550 }
        ];

        // 偵測熱量
        document.getElementById('todayFood').addEventListener('input', function () {
            let total = 0;
            calorieDictionary.forEach(item => {
                item.keywords.forEach(key => {
                    if (this.value.includes(key)) total += item.calorie;
                });
            });
            document.getElementById('caloriePreview').innerText = `預估熱量：${total} 大卡`;
        });

        function saveWeight() {
            const w = document.getElementById('todayWeight').value;
            const t = document.getElementById('targetWeight').value;
            if (!w) { alert('請輸入體重'); return; }
            localStorage.setItem('targetWeight', t);
            saveLog({ date: new Date().toLocaleDateString(), weight: w, type: '體重' });
            alert('體重已鎖定！');
        }

        function saveFood() {
            const f = document.getElementById('todayFood').value;
            const cal = document.getElementById('caloriePreview').innerText;
            if (!f) { alert('請輸入飲食內容'); return; }
            saveLog({ date: new Date().toLocaleDateString(), food: f, cal: cal, type: '飲食' });
            alert('飲食已紀錄！');
        }

        function saveLog(data) {
            let logs = JSON.parse(localStorage.getItem('myLogs') || '[]');
            logs.push(data);
            localStorage.setItem('myLogs', JSON.stringify(logs));
            renderLogs();
        }

        function renderLogs() {
            const list = document.getElementById('historyList');
            const logs = JSON.parse(localStorage.getItem('myLogs') || '[]');
            list.innerHTML = logs.map(l => `
                <div class="history-item">
                    📅 ${l.date} | 類型：${l.type}<br>
                    ${l.weight ? `⚖️ ${l.weight} kg` : `🍎 ${l.food} (${l.cal})`}
                </div>
            `).join('');
        }
        renderLogs();
    </script>
</body>

</html>
