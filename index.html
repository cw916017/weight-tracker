<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>體重日記 - 完整版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            padding: 20px;
            background-color: #f5ebe6;
            color: #5c4d43;
            padding-bottom: 80px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(140, 116, 98, 0.08);
        }

        h1 {
            text-align: center;
            color: #222222;
            font-weight: 700;
            margin-bottom: 5px;
            font-size: 26px;
        }

        .name-box {
            margin-bottom: 20px;
            text-align: center;
            background: #fdfaf7;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #e1d4cc;
        }

        .name-box input {
            width: 100%;
            text-align: center;
            font-weight: 700;
            color: #b88e6f;
            border: none;
            background: transparent;
            font-size: 16px;
        }

        .target-box {
            background: #fdfaf7;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px dashed #d9c8be;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        h3 {
            color: #8c7462;
            font-weight: 700;
            border-bottom: 2px solid #f2e6df;
            padding-bottom: 8px;
            margin-top: 30px;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e1d4cc;
            background-color: #faf6f3;
            border-radius: 10px;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        button.primary-btn {
            width: 100%;
            padding: 14px;
            background-color: #b88e6f;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .history-item {
            background: #faf6f3;
            padding: 12px;
            border-radius: 10px;
            margin-top: 8px;
            border-left: 4px solid #d9b496;
            font-size: 14px;
        }

        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #d9b496;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 15px 25px;
            font-weight: 700;
            box-shadow: 0 8px 25px rgba(217, 180, 150, 0.6);
            cursor: pointer;
            z-index: 1000;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1001;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 85%;
            max-width: 350px;
            text-align: center;
        }

        .progress-bar-bg {
            background: #f2e6df;
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, #d9b496, #b88e6f);
            height: 100%;
            width: 0%;
            transition: width 1s ease-out;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>⚖️ 體重日記</h1>
        <div class="name-box">
            <input type="text" id="userName" placeholder="輸入您的尊稱" onchange="saveName()">
        </div>

        <div class="target-box">
            <label>🎯 目標體重 (kg)：</label>
            <input type="number" id="targetWeight" placeholder="75" style="width:80px;" onchange="saveTarget()">
        </div>

        <input type="number" step="0.1" id="todayWeight" placeholder="今日體重 (kg)">
        <input type="text" id="todayFood" placeholder="今日飲食 (例如：滷肉飯)">
        <button id="saveBtn" class="primary-btn">💾 存下今日紀錄</button>

        <h3>📊 體重趨勢圖</h3>
        <canvas id="weightChart"></canvas>

        <h3>📜 歷史紀錄</h3>
        <div id="historyList"></div>
    </div>

    <button class="fab" id="fabBtn">🏆 看進度</button>

    <div class="modal-overlay" id="progressModal">
        <div class="modal-content">
            <h2 id="greeting"></h2>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBarFill"></div>
            </div>
            <p id="progressKg"></p>
            <button onclick="document.getElementById('progressModal').style.display='none'"
                class="primary-btn">關閉</button>
        </div>
    </div>

    <script>
        let myChart;

        function saveName() { localStorage.setItem('userName', document.getElementById('userName').value); }
        function saveTarget() { localStorage.setItem('targetWeight', document.getElementById('targetWeight').value); }

        window.onload = function () {
            document.getElementById('userName').value = localStorage.getItem('userName') || '';
            document.getElementById('targetWeight').value = localStorage.getItem('targetWeight') || '';
            updateDashboard();
        };

        document.getElementById('saveBtn').addEventListener('click', () => {
            const weight = document.getElementById('todayWeight').value;
            if (!weight) return alert("請填寫體重");
            const history = JSON.parse(localStorage.getItem('weightHistoryLog') || '[]');
            history.push({ date: new Date().toLocaleDateString(), weight: parseFloat(weight) });
            localStorage.setItem('weightHistoryLog', JSON.stringify(history));
            updateDashboard();
            alert('紀錄已儲存！');
        });

        function updateDashboard() {
            const history = JSON.parse(localStorage.getItem('weightHistoryLog') || '[]');
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            history.slice().reverse().forEach(item => {
                list.innerHTML += `<div class="history-item">${item.date}：${item.weight} kg</div>`;
            });

            const ctx = document.getElementById('weightChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: history.map(h => h.date),
                    datasets: [{ label: '體重紀錄 (kg)', data: history.map(h => h.weight), borderColor: '#b88e6f', tension: 0.3 }]
                }
            });
        }

        document.getElementById('fabBtn').addEventListener('click', () => {
            const name = localStorage.getItem('userName') || "老闆";
            document.getElementById('greeting').innerText = "嗨 " + name + "！";
            document.getElementById('progressModal').style.display = 'flex';
            document.getElementById('progressBarFill').style.width = '60%';
        });
    </script>
</body>

</html>
