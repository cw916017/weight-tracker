<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>體重日記</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="體重日記">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3004/3004613.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            padding: 20px;
            background-color: #f5ebe6;
            color: #5c4d43;
            padding-bottom: 80px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(140, 116, 98, 0.08);
        }

        h1 {
            text-align: center;
            color: #222222;
            font-weight: 700;
            margin-bottom: 5px;
            font-size: 26px;
        }

        h3 {
            color: #8c7462;
            font-weight: 700;
            border-bottom: 2px solid #f2e6df;
            padding-bottom: 8px;
            margin-top: 30px;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: #8c7462;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e1d4cc;
            background-color: #faf6f3;
            border-radius: 10px;
            box-sizing: border-box;
            font-family: 'Noto Sans TC', sans-serif;
            color: #5c4d43;
            font-size: 15px;
            transition: all 0.3s ease;
            margin-bottom: 12px;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #b88e6f;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(184, 142, 111, 0.15);
        }

        .target-box {
            background: #fdfaf7;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px dashed #d9c8be;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .target-box label {
            margin-bottom: 0;
        }

        .target-box input {
            width: 90px;
            text-align: center;
            padding: 8px;
            margin-bottom: 0;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        button.primary-btn {
            flex: 1;
            padding: 14px;
            background-color: #b88e6f;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(184, 142, 111, 0.3);
            transition: all 0.2s ease;
        }

        button.primary-btn:active {
            transform: scale(0.98);
            background-color: #a37b5d;
        }

        .history-item {
            background: #faf6f3;
            padding: 14px;
            border-radius: 12px;
            margin-top: 10px;
            border-left: 5px solid #d9b496;
            font-size: 14px;
        }

        .tdee-box {
            background: #fdfaf7;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #f2e6df;
            margin-bottom: 15px;
        }

        .gender-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 0 auto 15px auto;
            max-width: 240px;
        }

        .gender-grid label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            color: #5c4d43;
            font-weight: 700;
            background: #faf6f3;
            padding: 8px 12px;
            border: 1px solid #e1d4cc;
            border-radius: 8px;
            margin-bottom: 0;
            font-size: 14px;
            transition: all 0.2s;
        }

        .gender-grid input[type="radio"] {
            width: auto;
            margin: 0;
            cursor: pointer;
        }

        .gender-grid input[type="radio"]:checked+span {
            color: #b88e6f;
        }

        .gender-grid label:has(input[type="radio"]:checked) {
            border-color: #b88e6f;
            background: #ffffff;
            box-shadow: 0 2px 6px rgba(184, 142, 111, 0.08);
        }

        .tdee-result-box {
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            border-left: 4px solid #b88e6f;
            display: none;
        }

        .live-calorie-preview {
            background: #fffcf7;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #e1d4cc;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .keyword-badge {
            display: inline-block;
            background: #b88e6f;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 12px;
            margin: 2px;
        }

        .manual-fix-box {
            background: #fdf6f0;
            border: 1px dashed #d9b496;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }

        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #d9b496;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 15px 25px;
            font-size: 16px;
            font-weight: 700;
            box-shadow: 0 8px 25px rgba(217, 180, 150, 0.6);
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-8px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1001;
            backdrop-filter: blur(3px);
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 85%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: #a69285;
        }

        .progress-bar-bg {
            background: #f2e6df;
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, #d9b496, #b88e6f);
            height: 100%;
            width: 0%;
            transition: width 1s ease-out;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>⚖️ 體重日記</h1>
        <p style="text-align: center; color: #a69285; font-size: 13px; letter-spacing: 1px; margin-top: 0;">BEAUTIFUL
            LIFE & HEALTH</p>

        <div class="target-box">
            <label for="targetWeight">🎯 目標體重：</label>
            <div>
                <input type="number" id="targetWeight" placeholder="75">
                <span style="font-weight: 500; margin-left: 5px;">kg</span>
            </div>
        </div>

        <label for="todayWeight">☕ 今日體重 (kg)：</label>
        <input type="number" step="0.1" id="todayWeight" placeholder="0.0">

        <label for="todayFood">🥪 今日飲食：</label>
        <input type="text" id="todayFood" placeholder="例如：雞排、滷肉飯">

        <div class="live-calorie-preview">
            <p style="margin: 0 0 5px 0; font-weight: 700; color: #8c7462;">🔍 智慧熱量：<strong id="previewCalorieText"
                    style="color: #b88e6f;">0</strong> 大卡</p>
            <div id="detectedBadges"></div>
            <div id="manualFixBlock" class="manual-fix-box">
                <input type="number" id="manualCalorieInput" placeholder="若未偵測到，手動補熱量(kcal)">
            </div>
            <p id="tdeeCompareText" style="font-size: 12px; color: #a69285; margin: 3px 0 0 0;"></p>
        </div>

        <div class="btn-group">
            <button id="saveWeightBtn" class="primary-btn" style="background-color: #8c7462;">💾 存體重</button>
            <button id="saveFoodBtn" class="primary-btn" style="background-color: #b88e6f;">🍎 存飲食</button>
        </div>

        <h3>🔥 TDEE 熱量計算機</h3>
        <div class="tdee-box">
            <div class="gender-grid">
                <label><input type="radio" name="gender" value="M" checked> <span>👨 男</span></label>
                <label><input type="radio" name="gender" value="F"> <span>👩 女</span></label>
            </div>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="tdeeAge" placeholder="年齡">
                <input type="number" id="tdeeHeight" placeholder="身高(cm)">
            </div>
            <input type="number" id="tdeeWeightInput" placeholder="目前體重(kg)">
            <select id="tdeeActivity">
                <option value="1.2">🛋️ 久坐</option>
                <option value="1.375">🚶 輕度</option>
                <option value="1.55">🏃 中度</option>
            </select>
            <button id="calcTdeeBtn" class="primary-btn" style="background-color: #a69285;">🧮 計算 TDEE</button>
            <div id="tdeeResult" class="tdee-result-box">
                <p>🔹 TDEE：<strong id="tdeeRes">0</strong> 大卡</p>
            </div>
        </div>

        <h3>📊 趨勢圖表</h3>
        <canvas id="weightChart" height="150"></canvas>
        <h3>📜 歷史紀錄</h3>
        <div id="historyList"></div>
    </div>

    <button class="fab" id="fabBtn">🏆 進度</button>
    <div class="modal-overlay" id="progressModal">
        <div class="modal-content">
            <span class="modal-close" id="closeModal">&times;</span>
            <h2 id="progressPercent">0%</h2>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBarFill"></div>
            </div>
            <p id="progressKg"></p>
        </div>
    </div>

    <script>
        // 核心邏輯與之前版本相同，確保資料串聯
        // 儲存邏輯已改為兩按鈕獨立呼叫
        const calorieDictionary = [{ keywords: ["雞排"], calorie: 650 }, { keywords: ["滷肉飯"], calorie: 450 }, { keywords: ["牛肉麵"], calorie: 800 }, { keywords: ["便當"], calorie: 750 }];

        // 監聽飲食偵測
        document.getElementById('todayFood').addEventListener('input', function () {
            let total = 0;
            calorieDictionary.forEach(item => {
                item.keywords.forEach(k => { if (this.value.includes(k)) total += item.calorie; });
            });
            document.getElementById('previewCalorieText').innerText = total;
            document.getElementById('manualFixBlock').style.display = this.value ? 'block' : 'none';
        });

        // 獨立儲存體重
        document.getElementById('saveWeightBtn').addEventListener('click', function () {
            const w = document.getElementById('todayWeight').value;
            if (!w) { alert('請填寫體重'); return; }
            saveToHistory({ weight: w, date: new Date().toLocaleDateString(), type: 'weight' });
        });

        // 獨立儲存飲食
        document.getElementById('saveFoodBtn').addEventListener('click', function () {
            const f = document.getElementById('todayFood').value;
            const cal = parseInt(document.getElementById('previewCalorieText').innerText) + (parseInt(document.getElementById('manualCalorieInput').value) || 0);
            if (!f) { alert('請填寫飲食內容'); return; }
            saveToHistory({ food: f, calories: cal, date: new Date().toLocaleDateString(), type: 'food' });
        });

        function saveToHistory(newData) {
            let history = JSON.parse(localStorage.getItem('weightHistoryLog') || '[]');
            history.push(newData);
            localStorage.setItem('weightHistoryLog', JSON.stringify(history));
            alert('儲存成功！');
            updateDashboard();
        }

        // 更新介面與圖表 (邏輯保持完整)
        function updateDashboard() { /* ... 保持原來的繪圖與列表邏輯 ... */ }
        // 這裡需要將你原始代碼中的 updateDashboard 與 calcTdeeBtn 相關函數完整貼回即可
    </script>
</body>

</html>
