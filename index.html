<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>體重日記</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="體重日記">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3004/3004613.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* CSS 樣式保持不變 */
        body {
            font-family: 'Noto Sans TC', sans-serif;
            padding: 20px;
            background-color: #f5ebe6;
            color: #5c4d43;
            padding-bottom: 80px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(140, 116, 98, 0.08);
        }

        h1 {
            text-align: center;
            color: #222222;
            font-weight: 700;
            margin-bottom: 5px;
            font-size: 26px;
        }

        h3 {
            color: #8c7462;
            font-weight: 700;
            border-bottom: 2px solid #f2e6df;
            padding-bottom: 8px;
            margin-top: 30px;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: #8c7462;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e1d4cc;
            background-color: #faf6f3;
            border-radius: 10px;
            box-sizing: border-box;
            font-family: 'Noto Sans TC', sans-serif;
            color: #5c4d43;
            font-size: 15px;
            transition: all 0.3s ease;
            margin-bottom: 12px;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #b88e6f;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(184, 142, 111, 0.15);
        }

        .target-box {
            background: #fdfaf7;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px dashed #d9c8be;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .target-box label {
            margin-bottom: 0;
        }

        .target-box input {
            width: 90px;
            text-align: center;
            padding: 8px;
            margin-bottom: 0;
        }

        button.primary-btn {
            width: 100%;
            padding: 14px;
            background-color: #b88e6f;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 5px;
            box-shadow: 0 5px 15px rgba(184, 142, 111, 0.3);
            transition: all 0.2s ease;
        }

        button.primary-btn:active {
            transform: scale(0.98);
            background-color: #a37b5d;
        }

        .history-item {
            background: #faf6f3;
            padding: 14px;
            border-radius: 12px;
            margin-top: 10px;
            border-left: 5px solid #d9b496;
            font-size: 14px;
        }

        .tdee-box {
            background: #fdfaf7;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #f2e6df;
            margin-bottom: 15px;
        }

        .gender-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 0 auto 15px auto;
            max-width: 240px;
        }

        .gender-grid label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            color: #5c4d43;
            font-weight: 700;
            background: #faf6f3;
            padding: 8px 12px;
            border: 1px solid #e1d4cc;
            border-radius: 8px;
            margin-bottom: 0;
            font-size: 14px;
            transition: all 0.2s;
        }

        .gender-grid input[type="radio"] {
            width: auto;
            margin: 0;
            cursor: pointer;
        }

        .gender-grid input[type="radio"]:checked+span {
            color: #b88e6f;
        }

        .gender-grid label:has(input[type="radio"]:checked) {
            border-color: #b88e6f;
            background: #ffffff;
            box-shadow: 0 2px 6px rgba(184, 142, 111, 0.08);
        }

        .tdee-result-box {
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            border-left: 4px solid #b88e6f;
            display: none;
        }

        .tdee-result-box p {
            margin: 5px 0;
            font-size: 14px;
        }

        .tdee-result-box strong {
            color: #b88e6f;
            font-size: 16px;
        }

        .live-calorie-preview {
            background: #fffcf7;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #e1d4cc;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .keyword-badge {
            display: inline-block;
            background: #b88e6f;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 12px;
            margin: 2px;
        }

        .manual-fix-box {
            background: #fdf6f0;
            border: 1px dashed #d9b496;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }

        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #d9b496;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 15px 25px;
            font-size: 16px;
            font-weight: 700;
            box-shadow: 0 8px 25px rgba(217, 180, 150, 0.6);
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-8px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1001;
            backdrop-filter: blur(3px);
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 85%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: #a69285;
        }

        .progress-bar-bg {
            background: #f2e6df;
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, #d9b496, #b88e6f);
            height: 100%;
            width: 0%;
            transition: width 1s ease-out;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>⚖️ 體重日記</h1>
        <p style="text-align: center; color: #a69285; font-size: 13px; letter-spacing: 1px; margin-top: 0;">BEAUTIFUL
            LIFE & HEALTH</p>

        <!-- 新增姓名欄位 -->
        <label for="userName">👤 您的名字：</label>
        <input type="text" id="userName" placeholder="請輸入姓名">

        <div class="target-box">
            <label for="targetWeight">🎯 目標體重：</label>
            <div><input type="number" id="targetWeight" placeholder="75"><span
                    style="font-weight: 500; margin-left: 5px;">kg</span></div>
        </div>

        <label for="todayWeight">☕ 今日體重紀錄：</label>
        <input type="number" step="0.1" id="todayWeight" placeholder="0.0">

        <label for="todayFood">🥪 今日飲食：</label>
        <input type="text" id="todayFood" placeholder="例如：雞排">

        <div class="live-calorie-preview">
            <p style="margin: 0 0 5px 0; font-weight: 700; color: #8c7462;">🔍 智慧熱量偵測中：</p>
            <div id="detectedBadges" style="margin-bottom: 5px;"></div>
            <p style="margin: 5px 0 0 0;">預估今日攝取總熱量：<strong id="previewCalorieText"
                    style="color: #b88e6f; font-size: 18px;">0</strong> 大卡</p>
            <div id="manualFixBlock" class="manual-fix-box">
                <input type="number" id="manualCalorieInput" placeholder="手動追加熱量(卡)">
            </div>
        </div>

        <button id="saveBtn" class="primary-btn">💾 存檔並同步至 Google Sheets</button>

        <h3>🔥 TDEE 熱量計算機</h3>
        <div class="tdee-box">
            <!-- TDEE 欄位 -->
            <div class="gender-grid">
                <label><input type="radio" name="gender" value="M" checked> <span>👨 男性</span></label>
                <label><input type="radio" name="gender" value="F"> <span>👩 女性</span></label>
            </div>
            <input type="number" id="tdeeAge" placeholder="年齡">
            <input type="number" id="tdeeHeight" placeholder="身高 (cm)">
            <input type="number" id="tdeeWeightInput" placeholder="目前體重 (kg)">
            <select id="tdeeActivity">
                <option value="1.2">🛋️ 久坐</option>
                <option value="1.375">🚶 輕度運動</option>
                <option value="1.55">🏃 中度運動</option>
                <option value="1.725">🏋️ 高度運動</option>
            </select>
            <button id="calcTdeeBtn" class="primary-btn" style="background-color: #8c7462;">🧮 計算熱量</button>
            <div id="tdeeResult" class="tdee-result-box">
                <p>🔹 基礎代謝 (BMR)：<strong id="bmrRes">0</strong></p>
                <p>🔹 每日總消耗 (TDEE)：<strong id="tdeeRes">0</strong></p>
            </div>
        </div>

        <h3>📊 體重趨勢</h3>
        <canvas id="weightChart" width="400" height="260"></canvas>
        <h3>📜 歷史紀錄</h3>
        <div id="historyList"></div>
    </div>

    <button class="fab" id="fabBtn">🏆 看進度</button>

    <!-- 彈窗內容 -->
    <div class="modal-overlay" id="progressModal">
        <div class="modal-content">
            <span class="modal-close" id="closeModal">&times;</span>
            <h1 id="progressPercent">0%</h1>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBarFill"></div>
            </div>
            <p id="progressKg"></p>
        </div>
    </div>

    <script>
        // 核心設定：請替換為你的網址
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxMopdHngiCOOQwqiQLfIfinaiOvjXTxlm7KINll6labWb0DYw-ZklvgpMiXe0rsCs2PA/exec";
        let baseDetectedCalorie = 0;
        let manualAddedCalorie = 0;

        // [這裡請保留你原本的 calorieDictionary 與所有事件邏輯]
        // 我簡化了 saveBtn 的邏輯，其餘邏輯請貼在下方：

        document.getElementById('saveBtn').addEventListener('click', function () {
            const name = document.getElementById('userName').value;
            const weight = document.getElementById('todayWeight').value;
            const food = document.getElementById('todayFood').value;
            const calories = baseDetectedCalorie + manualAddedCalorie;

            if (!name || !weight) { alert('請填寫姓名與體重！'); return; }

            const data = { name, weight, food, calories, date: new Date().toLocaleDateString() };

            // 1. 本地存檔
            let historyLog = JSON.parse(localStorage.getItem('weightHistoryLog')) || [];
            historyLog.push(data);
            localStorage.setItem('weightHistoryLog', JSON.stringify(historyLog));

            // 2. 雲端同步
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(() => alert('🎉 已同步至雲端！')).catch(() => alert('本地已存，雲端同步失敗。'));

            updateDashboard();
        });

        // 請確保將你原本 script 內的其他功能函數（如 updateDashboard, 飲食偵測等）接續貼在這裡即可
    </script>
</body>

</html>
